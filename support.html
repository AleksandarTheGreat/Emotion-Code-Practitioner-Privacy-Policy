<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/ic_logo.jpeg" />
    <title>EC Practitioner Support</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #07090f;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.75;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 580px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .icon-bubble {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 18px;
            font-size: 28px;
            margin-bottom: 24px;
        }
        h1 {
            font-family: 'Sora', sans-serif;
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 800;
            line-height: 1.2;
            margin-top: 0;
            margin-bottom: 14px;
            background: linear-gradient(120deg, #3b82f6 20%, #06b6d4 80%);
            -webkit-background-clip: text;
            -webkit-text-fill_color: transparent;
            background-clip: text;
            color: transparent;
        }
        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 32px;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }
        h2 {
            font-family: 'Sora', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .support-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 24px 20px;
            border-radius: 16px;
            transition: border-color 0.25s ease;
        }
        .support-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }
        .email-link {
            display: block;
            font-size: 18px;
            color: #60a5fa;
            text-decoration: none;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 0.2px;
            transition: color 0.2s ease;
        }
        .email-link:hover {
            color: #93c5fd;
        }
        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }
            .container {
                padding: 36px 20px;
                border-radius: 20px;
            }
            .email-link {
                font-size: 15.5px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-bubble">💬</div>
    <h1>EC Practitioner Support</h1>
    <p>If you need help with the app, encounter a bug, or have any functional questions, our support desk is active and ready to assist you.</p>

    <div class="support-card">
        <h2>Contact Us</h2>
        <p style={{ margin: '0 0 8px 0', fontSize: '14.5px' }}>Please email us directly at:</p>
        <a href="mailto:aleksandar.ecpapp@gmail.com" class="email-link">aleksandar.ecpapp@gmail.com</a>
    </div>
</div>

</body>
</html>
